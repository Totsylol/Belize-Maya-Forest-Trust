server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Compress text assets on the fly (big win for the JS/CSS bundles)
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # Hashed build assets never change content -> cache them for a year
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Single-page app: send unknown paths to index.html so client-side
    # routing (react-router) works on refresh / deep links
    location / {
        try_files $uri $uri/ /index.html;
    }
}
