# Production: serve the prebuilt React build/ with nginx.
# Deploy by rsync'ing this file, nginx.conf, and the build/ folder to the host,
# then: docker compose -f docker-compose.prod.yml up -d
services:
  frontend:
    image: nginx:alpine
    container_name: bmft-frontend
    ports:
      - "3000:80"            # host:container — change 3000 if your site uses another port
    volumes:
      - ./build:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
